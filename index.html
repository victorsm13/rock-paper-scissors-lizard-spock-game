<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game: R.P.S.L.S. </title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>

    <div class="resultContainer jsResultContainer hidden">
        <div class="resultBox jsResultBox">
            <p class="result jsResult"></p>
            <p class="moves jsMoves"></p>
        </div>
    </div>

    <div class="wrapper">
        <h1 id="title">Game: Rock, Paper, Scissors, Lizard & Spock</h1>

        <div class="gameContainer">
            <h2 class="subtitle">Click the icon below to play</h2>

              <div class="gameBox">
                 <div title="rock" class="option jsRock" id="rock"> 🗿</div>
                 <div title="paper" class="option jsPaper" id="paper"> 📝</div>
                 <div title="scissors" class="option jsScissors" id="scissors">✂️</div>
                 <div title="lizard" class="option jsLizard" id="lizard"> 🦎</div>
                 <div title="spock" class="option jsSpock" id="spock"> 🖖</div>
              </div>

              <div class="scoreContainer">
                <div class="scoreTitle">
                    <h2>Score board</h2>
                </div>
                <div class="scoreBoardBox">
                    <div class="userScoreBoard">
                    <div><span class="userText">user</span></div>
                    <div><img src="./assets/alien.png" alt=""></div>
                    <div class="scoreBox">
                        <div class="winsBox">Wins: <span class="wins jsUserWins">0</span></div>
                        <div class="lossesBox">Losses: <span class="losses jsUserLosses">0</span></div>
                    </div>
                </div>
                <div class="tiesBox">
                    <p class="tiesText">X</p>
                    <span>Ties: <span class="ties jsTies">0</span></span>
                    <button class="resetBttn jsResetBttn">reset game</button>
                </div>
                <div class="computerScoreBoard">
                    <div><span class="computerText">computer</span></div>
                    <div><img src="./assets/robot.png" alt=""></div>
                    <div class="scoreBox">
                        <div class="winsBox">Wins: <span class="wins jsComputerWins">0</span></div>
                        <div class="lossesBox">Losses: <span class="losses jsComputerLosses">0</span></div>
                    </div>
                </div>
                </div>
                
              </div>
        </div>
    </div>
    

    <script src="./script/index.js"></script>
</body>
</html>
